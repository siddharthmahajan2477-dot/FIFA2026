name: Production Build & Deployment Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate-frontend:
    name: Validate Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Execute Production Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.stadium.fifa.com
          NEXT_PUBLIC_WEBSOCKET_URL: wss://api.stadium.fifa.com/ws

  validate-backend:
    name: Validate FastAPI Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build Docker Container
        run: |
          docker build -t stadium-os-backend:latest -f backend/Dockerfile .
          
      - name: Validate Docker Compose Config
        run: docker-compose config
